<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      ;(function () {
        var stored = localStorage.getItem('theme')
        var theme =
          stored ||
          (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark')
        document.documentElement.dataset.theme = theme
        document.documentElement.style.backgroundColor =
          theme === 'light' ? '#fcfcfe' : '#1b1b19'
      })()
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Andrea Cutroni — Building Engineer & Computational Designer. Architecture, complex structures and sustainable design through computational workflows and data-driven methods."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <title>Andrea Cutroni — Building Engineer &amp; Computational Designer</title>
  </head>

  </body>
</html>
